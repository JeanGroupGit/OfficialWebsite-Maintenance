<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jean Group 新美齊集團</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .logo-img {
            max-width: 250px; /* 控制 Logo 最大寬度 */
            height: auto;
            margin-bottom: 30px;
        }
        .divider {
            width: 50px;
            height: 2px;
            background-color: #c9a063; /* 金色調展現質感 */
            margin: 20px auto;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 500;
        }
        p {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
        }
        .contact {
            margin-top: 40px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 圖片 Logo 已經加入這裡 -->
        <img src="logo.png" alt="新美齊集團 Logo" class="logo-img">
        
        <div class="divider"></div>
        
        <h1>網站系統升級中</h1>
        <p>
            為了提供更好的服務體驗，新美齊集團官方網站目前正在進行系統升級。<br>
            我們將於 2026/3/20 恢復服務，造成不便敬請見諒。
        </p>

        <div class="contact">
            如有緊急需求，請致電各案場或總公司服務專線。<br>
            © 2026 新美齊集團 版權所有
        </div>
    </div>

</body>
</html>
